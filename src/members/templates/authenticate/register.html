{% extends 'base/base.html' %}

{% block content %}
<div class="outer-form-box">
    <h3>Register</h3>
    <form class="model-forms" action="" method="POST">
        {% csrf_token %}
        {% for field in form %}
            {{ field.label }}
            {{ field }}
        {% endfor %}
        <input type="submit" name="Create User">
    </form>
    <small>Already have an account?  <a href="{% url 'login' %}">Login</a></small>
</div>
{% endblock %}
